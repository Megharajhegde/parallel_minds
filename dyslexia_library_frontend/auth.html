<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadApt - Join the Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f4f9;
            --text-color: #333;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary-color);
        }

        /* --- NEW: Logo Styling for Auth Page --- */
        .auth-logo {
            height: 60px;
            width: auto;
            margin-bottom: 15px;
            border-radius: 8px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h2 { 
            color: #1a1a1a; 
            margin-top: 0; 
            text-align: center; 
            font-size: 2rem;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 500; 
            color: #444; 
            font-size: 0.9rem;
        }

        /* --- Updated Input Styling for Password Toggle --- */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            font-family: 'Lexend', sans-serif;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        
        /* Make room for the eye icon on the right */
        input[type="password"],
        input#password {
            padding-right: 45px; 
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        /* The Show Password Button */
        .toggle-password-btn {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            transition: color 0.2s;
        }
        .toggle-password-btn:hover {
            color: var(--primary-color);
        }

        button.primary-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
        }

        button.primary-submit:hover { background: #0056b3; }
        button.primary-submit:active { transform: scale(0.98); }
        button.primary-submit:disabled { background: #ccc; cursor: not-allowed; }

        .toggle-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }
        
        .toggle-link a { 
            color: var(--primary-color); 
            text-decoration: none; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .guest-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #888;
            text-decoration: none;
        }
        .guest-link:hover { color: #333; text-decoration: underline; }

        #error-msg { 
            color: #dc3545; 
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px; 
            text-align: center; 
            margin-bottom: 20px; 
            display: none; 
        }
    </style>
</head>
<body>

<div class="auth-container">
    <img src="logo3.png" alt="ReadApt Logo" class="auth-logo" onerror="this.style.display='none'">
    
    <h2 id="auth-title">Welcome Back</h2>
    <p class="subtitle" id="auth-subtitle">Login to access your personal library.</p>
    
    <div id="error-msg"></div>
    
    <div id="name-group" class="input-group" style="display: none;">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="E.g., Jane Doe">
    </div>

    <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
    </div>

    <div class="input-group">
        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password" placeholder="••••••••">
            <button type="button" class="toggle-password-btn" onclick="togglePassword()" aria-label="Show password" title="Show password">
                👁️
            </button>
        </div>
    </div>

    <button id="auth-btn" class="primary-submit" onclick="handleAuth()">Login</button>

    <div class="toggle-link">
        <span id="toggle-text">Don't have an account?</span> 
        <a id="toggle-action" onclick="toggleAuthMode()">Create one here</a>
    </div>

    <a href="index.html" class="guest-link">Skip and continue as Guest →</a>
</div>

<script>
    let isLogin = true;

    // --- Show/Hide Password Logic ---
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.querySelector('.toggle-password-btn');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleBtn.innerText = '🔒'; // Change icon to a locked padlock when visible
            toggleBtn.setAttribute('title', 'Hide password');
        } else {
            passwordInput.type = 'password';
            toggleBtn.innerText = '👁️'; // Change icon back to eye when hidden
            toggleBtn.setAttribute('title', 'Show password');
        }
    }

    // --- 1. Toggle Between Login and Register UI ---
    function toggleAuthMode() {
        isLogin = !isLogin;
        
        // Update text for Register Mode
        document.getElementById('auth-title').innerText = isLogin ? 'Welcome Back' : 'Create Account';
        document.getElementById('auth-subtitle').innerText = isLogin ? 'Login to access your personal library.' : 'Sign up to upload your own PDFs.';
        document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Sign Up';
        
        // Update Toggle Link
        document.getElementById('toggle-text').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
        document.getElementById('toggle-action').innerText = isLogin ? 'Create one here' : 'Login here';
        
        // Show/Hide Name Field
        document.getElementById('name-group').style.display = isLogin ? 'none' : 'block';
        
        // Clear errors
        document.getElementById('error-msg').style.display = 'none';
    }

    // --- 2. Handle the Form Submission to Flask Backend ---
    async function handleAuth() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const name = document.getElementById('name').value.trim();
        const errorDiv = document.getElementById('error-msg');
        const btn = document.getElementById('auth-btn');

        // Basic Validation
        if (!email || !password || (!isLogin && !name)) {
            errorDiv.innerText = "Please fill in all required fields.";
            errorDiv.style.display = 'block';
            return;
        }

        // Determine which API endpoint to hit
        const endpoint = isLogin ? '/login' : '/register';
        const body = isLogin ? { email, password } : { name, email, password };

        // UI Loading State
        btn.disabled = true;
        btn.innerText = "Connecting...";
        errorDiv.style.display = 'none';

        try {
            const response = await fetch(`http://127.0.0.1:5000/api${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (response.ok) {
                // SUCCESS: Save user to localStorage
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html'; 
            } else {
                // FAILED: Show the error message from Flask
                errorDiv.innerText = data.error || "Authentication failed.";
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.innerText = "Cannot connect to server. Is Flask running?";
            errorDiv.style.display = 'block';
        } finally {
            // Reset UI State
            btn.disabled = false;
            btn.innerText = isLogin ? 'Login' : 'Sign Up';
        }
    }

    // Add "Enter Key" support for quick login
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            handleAuth();
        }
    });
</script>

</body>
</html>
