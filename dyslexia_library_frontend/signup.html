<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadApt – Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:      #f2ede4;
            --cream-dark: #e8e0d0;
            --black:      #1a0f0a;
            --ink:        #2e1a10;
            --muted:      rgba(46,26,16,0.55);
            --burnt:      rgb(177,56,15);
            --burnt-soft: rgba(177,56,15,0.1);
            --burnt-mid:  rgba(177,56,15,0.3);
            --orange:     rgb(219,133,13);
            --white:      #faf7f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        #onepage{
            height: 100vh;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── BACKGROUND ── */
        .bg-layer {
            position: fixed;
            inset: 0;
            background: url("library.jpeg") no-repeat center center / cover;
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 60% 50%, transparent 35%, rgba(242,237,228,0.75) 100%);
            z-index: 0;
            pointer-events: none;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 60px;
        }
        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 22px;
            color: var(--burnt);
            letter-spacing: 2px;
            text-decoration: none;
        }
        .nav-logo span {
            -webkit-text-stroke: 1.5px var(--burnt);
            -webkit-text-fill-color: transparent;
        }
        .nav-back {
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--burnt); }

        /* ── MAIN LAYOUT ── */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 80px;
            position: relative;
            z-index: 1;
        }

        /* ── AUTH CARD ── */
        .auth-card {
            width: 100%;
            max-width: 440px;
            opacity: 0;
            transform: translateY(24px);
            animation: fadeUp 0.7s ease 0.1s both;
        }

        .auth-eyebrow {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--burnt);
            margin-bottom: 10px;
        }

        .auth-heading {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--ink);
            line-height: 1.0;
            margin-bottom: 32px;
        }
        .auth-heading em {
            color: var(--burnt);
            font-style: italic;
        }

        /* ── TAB SWITCHER ── */
        .tab-switcher {
            display: flex;
            gap: 0;
            border: 1px solid var(--burnt-mid);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 32px;
            background: var(--cream-dark);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: background 0.25s, color 0.25s;
        }
        .tab-btn.active {
            background: var(--burnt);
            color: var(--white);
        }

        /* ── FORM ── */
        .auth-form {
            background: var(--white);
            border: 1px solid rgba(177,56,15,0.15);
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 8px 48px rgba(177,56,15,0.08);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-panel { display: none; flex-direction: column; gap: 18px; }
        .form-panel.active { display: flex; }

        .form-group { display: flex; flex-direction: column; gap: 7px; }
        .form-group label {
            font-size: 12px;
            letter-spacing: 0.5px;
            font-weight: 500;
            color: var(--muted);
        }
        .form-group input {
            background: var(--cream);
            border: 1px solid rgba(177,56,15,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--ink);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            width: 100%;
        }
        .form-group input::placeholder { color: var(--muted); opacity: 0.5; }
        .form-group input:focus {
            border-color: var(--burnt);
            background: rgba(177,56,15,0.03);
        }

        .submit-btn {
            background: var(--burnt);
            color: var(--white);
            border: none;
            padding: 14px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            margin-top: 4px;
        }
        .submit-btn:hover { background: var(--orange); transform: translateY(-2px); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .form-success {
            display: none;
            color: var(--burnt);
            font-size: 13px;
            text-align: center;
            padding: 12px;
            background: var(--burnt-soft);
            border-radius: 8px;
            border: 1px solid var(--burnt-mid);
        }

        .form-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            opacity: 0.6;
        }
        .form-divider::before,
        .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--burnt-mid);
        }

        .auth-switch {
            text-align: center;
            font-size: 13px;
            color: var(--muted);
            margin-top: 20px;
        }
        .auth-switch a {
            color: var(--burnt);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .auth-switch a:hover { text-decoration: underline; }

        /* ── DECORATIVE STAT ── */
        .auth-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-top: 28px;
            padding: 14px 20px;
            background: rgba(255,255,255,0.6);
            border: 1px solid var(--burnt-mid);
            border-left: 3px solid var(--burnt);
            border-radius: 8px;
            backdrop-filter: blur(4px);
            opacity: 0;
            animation: fadeUp 0.7s ease 0.5s both;
        }
        .badge-num {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--burnt);
            line-height: 1;
        }
        .badge-text {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
            max-width: 180px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .navbar { padding: 20px 24px; }
            .auth-heading { font-size: 36px; }
            .auth-form { padding: 24px; }
        }
    </style>
</head>
<body id="onepage">
<div class="bg-layer"></div>
<div class="bg-glow"></div>

<nav class="navbar">
    <a class="nav-logo" href="home.html">
        Read<span>Apt</span></a>
    <a class="nav-back" href="home.html">← Back to home</a>
</nav>

<main>
    <div class="auth-card">
        <p class="auth-eyebrow">Assistive Reading Platform</p>
        <h1 class="auth-heading">Welcome<br><em>back.</em></h1>

        <div class="tab-switcher">
            <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>

        <div class="auth-form">

            <!-- LOGIN PANEL -->
            <div class="form-panel active" id="panel-login">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="jane@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button class="submit-btn" onclick="handleLogin(this)">Sign In</button>
                <div class="form-success" id="login-success">Welcome back! Redirecting...</div>
            </div>

            <!-- REGISTER PANEL -->
            <div class="form-panel" id="panel-register">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Jane Doe" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="jane@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Choose a strong password" autocomplete="new-password" required>
                </div>
                <button class="submit-btn" onclick="handleRegister(this)">Create Account</button>
                <div class="form-success" id="register-success">Account created! You can now sign in.</div>
            </div>

        </div>

        <div class="auth-switch" id="switch-text">
            Don't have an account? <a onclick="switchTab('register')">Register here</a>
        </div>
</main>

<script>
    function switchTab(tab) {
        const loginPanel = document.getElementById('panel-login');
        const registerPanel = document.getElementById('panel-register');
        const tabs = document.querySelectorAll('.tab-btn');
        const switchText = document.getElementById('switch-text');
        const heading = document.querySelector('.auth-heading');

        if (tab === 'login') {
            loginPanel.classList.add('active');
            registerPanel.classList.remove('active');
            tabs[0].classList.add('active');
            tabs[1].classList.remove('active');
            heading.innerHTML = 'Welcome<br><em>back.</em>';
            switchText.innerHTML = `Don't have an account? <a onclick="switchTab('register')">Register here</a>`;
        } else {
            registerPanel.classList.add('active');
            loginPanel.classList.remove('active');
            tabs[1].classList.add('active');
            tabs[0].classList.remove('active');
            heading.innerHTML = 'Join<br><em>ReadApt.</em>';
            switchText.innerHTML = `Already have an account? <a onclick="switchTab('login')">Sign in</a>`;
        }
    }

    function handleLogin(btn) {
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        setTimeout(() => {
            btn.style.display = 'none';
            document.getElementById('login-success').style.display = 'block';
        }, 1000);
    }

    function handleRegister(btn) {
        btn.textContent = 'Creating account...';
        btn.disabled = true;
        setTimeout(() => {
            btn.style.display = 'none';
            document.getElementById('register-success').style.display = 'block';
        }, 1000);
    }
</script>
</body>
</html>
