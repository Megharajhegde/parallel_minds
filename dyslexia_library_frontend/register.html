<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body {
font-family: Arial;
background: linear-gradient(135deg, #667eea, #764ba2);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.container {
background: white;
padding: 30px;
border-radius: 10px;
width: 350px;
text-align: center;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
}

button {
width: 100%;
padding: 10px;
background: green;
color: white;
border: none;
}

a {
display: block;
margin-top: 10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Register</h2>

{% if message %}
<p style="color:red;">{{ message }}</p>
{% endif %}

<form action="/api/register-form" method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<a href="/api/login-page">Already have account? Login</a>

</div>

</body>
</html>
